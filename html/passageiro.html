<!doctype html>
<html lang="pt-br" data-bs-theme="light">
    <head>
        <title>SafetyParty</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="shortcut icon" href="../images/icone.ico" type="image/x-icon">
        <link rel="stylesheet" href="../assets/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bungee&family=Michroma&display=swap" rel="stylesheet">
        <!-- count particles -->
    <div class="count-particles">
    <span class="js-count-particles"></span></div>

    <!-- particles.js container -->
    <div id="particles-js"></div>
    <script src="particles.js"></script>

                    
    </head>

    <body>
        <header>
            <!-- place navbar here -->
        </header>
        <main>


            
        <div class="menulogin">
            <div class="Slogan">
            <div class="logo">
                <img src="../images/logo.png" alt="LogoSafetyParty">
            </div>
                <p>A festa começa com segurança e termina com alegria.</p>
            </div>

            <div id="menu">

                <div id="paginainicial">
                    <a href="../index.html">Pagina Inicial</a>
                </div>

                <p>Login</p>
            </div>

            <div class="login"> <!--Colocar o formulario de cadastro-->
                    <h4><b>Cadastro Passageiro</b></h4>
                    <form action="/cadastrar" method="post">
                        <div>
                            <label for="nome">Nome: </label>
                            <input type="text" id="inome" name="nome" required placeholder="Nome Completo">
                        </div>

                        <div>
                            <label for="email">Email: </label>
                            <input type="email" id="iemail" name="email" required placeholder="email@gmail.com" autocomplete="email">
                        </div>

                        <div>
                            <label for="senha">Senha: </label>
                            <input type="password" id="isenha" name="senha" minlength="8" maxlength="20" required>
                        </div>

                        <div>
                            <label for="confsenha">Confirmar senha: </label>
                            <input type="password" id="iconfsenha" name="confsenha" minlength="8" maxlength="20" required>
                        </div>

                        <div>
                            <label for="cpf">CPF:</label>
                            <input type="text" id="icpf" name="cpf" title="Digite o CPF no formato: 000.000.000-00" maxlength="14" required placeholder="Ex: 123.456.789-00">
                        </div>

                        <div>
                            <label for="ddnasc">Data de Nascimento: </label>
                            <input type="date" id="iddnasc" name="ddnasc" required placeholder="00/00/00">
                        </div>                        

                        <div>
                            <label for="telefone">Telefone de contato: </label>
                            <input type="tel" id="itelefone" name="telefone" minlength="11" maxlength="14" required placeholder="(00)00000-0000">
                        </div>                        

                        <div>
                            <label for="nemergencia">Número de Emergência: </label>
                            <input type="tel" id="inemergencia" name="nemergencia" minlength="11" maxlength="14" required placeholder="Numero de parente/amigo">
                        </div>

                        <div>
                            <label for="foto">Escolha uma foto: (Não Obrigatório) </label>
                            <input type="file" id="ifoto" name="foto" accept="image/*">
                        </div>

                        <button type="submit">Criar Conta</button>
                    </form>
            </div>
        </div>


        </main>

        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    <!-- scripts -->
    <script src="../node_modules/particles.js/particles.js"></script>
    <script src="../js/app.js"></script>             
    </body>
</html>
