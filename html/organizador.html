 <div class="login"> <!--Colocar o formulario de cadastro-->
                    <h4><b>Cadastro Organizador</b></h4>
                    <form action="../php/cpassageiro.php" method="post">
                        <div>
                            <label for="nome">Nome: </label>
                            <input type="text" id="inome" name="nome" required placeholder="Nome Completo">
                        </div>

                        <div>
                            <label for="email">Email: </label>
                            <input type="email" id="iemail" name="email" required placeholder="email@gmail.com" autocomplete="email">
                        </div>

                        <div>
                            <label for="senha">Senha: </label>
                            <input type="password" id="isenha" name="senha" minlength="8" maxlength="20" required>
                        </div>

                        <div>
                            <label for="confsenha">Confirmar senha: </label>
                            <input type="password" id="iconfsenha" name="confsenha" minlength="8" maxlength="20" required>
                        </div>

                        <div>
                            <label for="cpf">CNPJ:</label>
                            <input type="text" id="icnpj" name="cnpj" title="Digite o CNPJ" maxlength="14" required placeholder="Ex: 12.345.678/0001-95">
                        </div>                     

                        <div>
                            <label for="telefone">Telefone de contato do evento: </label>
                            <input type="tel" id="itelefone" name="telefone" minlength="11" maxlength="14" required placeholder="(00)00000-0000">
                        </div>                        

                        <div>
                            <label for="foto">Escolha uma foto do evento: </label>
                            <input type="file" id="ifoto" name="foto" accept="image/*">
                        </div>

                        <button onclick="exibirAlerta()" type="submit">Criar Conta</button>
                    </form>
            </div>
