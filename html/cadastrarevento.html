 <div class="login"> <!--Colocar o formulario de cadastro-->
                    <h4><b>Cadastro de evento</b></h4>
                    <form action="../php/cadastroevento.php" method="get">
                        <div>
                            <label for="nome">Nome do evento: </label>

                       <div>
                            <label for="compraring">Link para compra do ingresso: </label>
                            <input type="url" name="compraring" id="icompraring" placeholder="Link para compra ingresso do evento">
